<table role="presentation" width="100%" height="100%" cellpadding="0" cellspacing="0" style="height:100%;border:1px solid #eaecf0;border-radius:10px;overflow:hidden;">
  <tr>
    <td>
      <a href="{{link}}" target="_blank">
        <img src="{{image}}" width="252" height="200" alt="{{title}}" style="display:block;width:100%;height:200px;object-fit:cover;object-position:center;background:#f8fafc;" />
      </a>
    </td>
  </tr>
  <tr>
    <td valign="top" height="100%" style="height:100%;padding:12px 14px 4px 14px;">
      {{badge}}
      <p style="margin:8px 0 6px 0;font-family:Arial,sans-serif;font-size:14px;line-height:1.4;color:#1e3a5f;font-weight:bold;min-height:38px;">
        {{title}}
      </p>
      <p style="margin:0;font-family:Arial,sans-serif;font-size:14px;line-height:1.4;">
        {{price}}
      </p>
    </td>
  </tr>
  <tr>
    <td valign="bottom" style="padding:12px 14px 16px 14px;">
      <a href="{{link}}" target="_blank" style="display:block;background-color:#1e3a5f;color:#ffffff;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;text-align:center;padding:10px 12px;border-radius:8px;">
        Zum Produkt
      </a>
    </td>
  </tr>
</table>
