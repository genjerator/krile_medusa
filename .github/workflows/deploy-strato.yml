name: Deploy to Strato VPS

# Manual-trigger for now so it does not collide with the AWS workflow during
# migration. Switch to `push: { branches: [main] }` once AWS is retired (and
# disable deploy-aws.yml), so a push to main deploys the backend to the VPS.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/krile-medusa

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # lets GITHUB_TOKEN push to GHCR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64   # Strato VPS is x86_64 (NOT arm64 like Graviton)
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      # Base64-encode the env file secret to a single, shell-safe line. Inlining
      # the raw multi-line ENV_STRATO into the deploy shell breaks on its quotes/
      # <>/URLs (e.g. SMTP_FROM="… <info@…>"), so the shell tried to run parts of
      # it as commands. The encoded value is masked so it never appears in logs.
      - name: Encode env file for safe transfer
        id: envfile
        env:
          ENV_STRATO: ${{ secrets.ENV_STRATO }}
        run: |
          B64=$(printf '%s' "$ENV_STRATO" | base64 -w0)
          echo "::add-mask::$B64"
          echo "b64=$B64" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STRATO_HOST }}
          username: ${{ secrets.STRATO_USER }}
          key: ${{ secrets.STRATO_SSH_KEY }}
          script: |
            # Fail the step (and the workflow) on ANY error — without this a failed
            # git pull / docker login / pull is silently ignored and the deploy
            # falsely reports success while nothing is updated.
            set -euo pipefail

            cd ~/app

            # Sync code to EXACTLY match main. `reset --hard` avoids the "local
            # changes would be overwritten by merge" failure that `git pull` hits
            # when a tracked file (compose/Caddyfile) was edited directly on the VPS.
            # (.env.strato is gitignored, so it is never touched by this.)
            git fetch origin main
            git reset --hard origin/main

            # Write env file by decoding the base64 (single shell-safe line,
            # built in the previous step). Avoids the shell-injection that a raw
            # multi-line secret with quotes/<>/URLs causes.
            echo "${{ steps.envfile.outputs.b64 }}" | base64 -d > .env.strato

            # Log in to GHCR to pull private images (PAT needs read:packages)
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the freshly built image and force the backend to run it.
            # --force-recreate guarantees the new image is used even if compose
            # thinks the (unchanged :latest tag) config is up to date.
            docker compose -f docker-compose.strato.yml pull medusa
            docker compose -f docker-compose.strato.yml up -d --no-deps --force-recreate medusa

            # Show what is now running so the deploy log proves the new image ran.
            docker compose -f docker-compose.strato.yml ps medusa
            docker compose -f docker-compose.strato.yml images medusa

            # Clean up unused images
            docker image prune -f
