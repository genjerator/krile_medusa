services:

  # ─── MEDUSA BACKEND + ADMIN (:8000) ───────────────────────────────────────
  medusa:
    image: ghcr.io/genjerator/krile-medusa:latest
    ports:
      - "8000:9000"
    env_file:
      - .env.strato
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # ─── STOREFRONT: KRILE PLANETA INDUSTRIES (:9000) ─────────────────────────
  # DISABLED — GHCR image not built yet. Re-enable once the storefront repo
  # pushes ghcr.io/genjerator/krile-storefront.
  # storefront-planeta-industries:
  #   image: ghcr.io/genjerator/krile-storefront:latest
  #   ports:
  #     - "9000:3000"
  #   env_file:
  #     - .env.strato
  #   restart: unless-stopped

  # ─── STOREFRONT: PLANETA GMBH (:9002) ─────────────────────────────────────
  # DISABLED — GHCR image not built yet. Re-enable once the storefront repo
  # pushes ghcr.io/genjerator/planeta-gmbh-storefront.
  # storefront-planeta:
  #   image: ghcr.io/genjerator/planeta-gmbh-storefront:latest
  #   ports:
  #     - "9002:3000"
  #   env_file:
  #     - .env.strato
  #   restart: unless-stopped

  # ─── POSTGRES ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    # Reads POSTGRES_USER/PASSWORD/DB from .env.strato (same file as the app),
    # so the container password always matches DATABASE_URL. (Using ${...} here
    # would pull from a root .env/shell instead and silently init blank.)
    env_file:
      - .env.strato
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medusa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── REDIS ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── CADDY REVERSE PROXY (:80/:443) — automatic HTTPS ─────────────────────
  # Routes by hostname to the backend + both storefronts over the internal
  # docker network (upstreams = service names: medusa:9000, storefront-*:3000).
  # Caddy obtains AND auto-renews Let's Encrypt certs — no certbot, no cron.
  # Config: ./Caddyfile. Certs/keys persist in the caddy_data volume.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - medusa
      # - storefront-planeta-industries   # re-enable with the storefront services
      # - storefront-planeta
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
