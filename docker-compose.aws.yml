services:
  medusa:
    image: ${ECR_IMAGE:-krile_medusa:latest}
    ports:
      - "9000:9000"
    env_file:
      - .env.aws
    environment:
      NODE_ENV: production
      # RDS — SSL required on AWS, no-verify skips cert validation (use require + cert for stricter security)
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:5432/${DB_NAME}?sslmode=no-verify
      # ElastiCache — no auth by default, add :password@ if you enabled Redis AUTH
      REDIS_URL: redis://${REDIS_HOST}:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: awslogs
      options:
        awslogs-group: /medusa/backend
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-stream-prefix: medusa
    restart: unless-stopped
