# admin.planetaindustries.de → Medusa backend + admin panel
# NOTE: SSL blocks are commented out until domains are ready.
#       Run nginx/init-ssl.sh first, then uncomment the HTTPS server block.

server {
    listen 80;
    server_name admin.planetaindustries.de;

    # location /.well-known/acme-challenge/ {
    #     root /var/www/certbot;
    # }

    location / {
        proxy_pass         http://medusa:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

