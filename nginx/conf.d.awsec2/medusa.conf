# admin.planetaindustries.de → Medusa backend + admin panel

server {
    listen 80;
    server_name admin.planetaindustries.de;

    client_max_body_size 50m;

    # Browsers without an "lng" cookie get a permanent German one, so the
    # admin language survives cleared site data / closed browsers.
    set $lng_cookie "";
    if ($http_cookie !~* "lng=") {
        set $lng_cookie "lng=de; Path=/; Max-Age=31536000; SameSite=Lax";
    }
    add_header Set-Cookie $lng_cookie;

    location / {
        proxy_pass         http://medusa:9000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
